kind = "web"
previewPath = "/"
title = "Evaluations"
version = "1.0.0"
id = "artifacts/evaluations-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21978
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/evaluations-portal run dev"

[services.env]
PORT = "21978"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/evaluations-portal", "run", "build"]
publicDir = "artifacts/evaluations-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
